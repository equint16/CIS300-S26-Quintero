<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to my project which introduces everyone to SDTF League">
    <meta name="keywords" content="CIS 300 project">
    <meta name="author" content="Elias Quintero">
    <title>Contact | InfoSdtf</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- New outer wrapper to align everything side-by-side -->
    <div class="page-wrapper">
    
        <!-- Left Side Image -->
        <img src="contact.jpeg" alt="Decorative left graphic" class="side-image">

        <!-- Your existing contact container -->
        <div class="contact-container">
            <h2>Contact Us</h2>
            <p>Fill out the form below and our team will get back to you with more information.</p>
        
            <form action="/submit-form" method="POST">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <!-- Email Address -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <!-- Pronouns -->
                <div class="form-group">
                    <label for="pronouns">Pronouns</label>
                    <select id="pronouns" name="pronouns">
                        <option value="" disabled selected>Select your pronouns (optional)</option>
                        <option value="he/him">he/him</option>
                        <option value="she/her">she/her</option>
                        <option value="they/them">they/them</option>
                        <option value="other">Other / Prefer not to say</option>
                    </select>
                </div>

                <!-- Skill Level -->
                <div class="form-group">
                    <label>Skill Level</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="skill-level" value="beginner" required> Beginner
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="skill-level" value="intermediate"> Intermediate
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="skill-level" value="advanced"> Advanced
                        </label>
                    </div>
                </div>

                <!-- Message -->
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Please let us know how we can help you..." required></textarea>
                </div>

                <button type="submit">Request Information</button>
            </form>
        </div>

        <!-- Right Side Image -->
        <img src="contact2.jpeg" alt="Decorative right graphic" class="side-image">

    </div>

</body>
</html>
